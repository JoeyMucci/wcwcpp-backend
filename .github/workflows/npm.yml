name: NPM Publish

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  id-token: write
  contents: read

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/ts
    steps:
    - uses: actions/checkout@v4
    - name: Setup Buf
      uses: bufbuild/buf-setup-action@v1
    - name: Generate Code
      run: buf generate
      working-directory: .
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        registry-url: 'https://registry.npmjs.org/'
    - run: npm install -g npm@latest
    - run: npm install
    - run: npm run build
    - run: npm publish
