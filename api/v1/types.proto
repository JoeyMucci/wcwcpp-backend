syntax = "proto3";

package api.v1;

option go_package = "github.com/joey/wcwcpp-backend/pkg/api/v1";

import "buf/validate/validate.proto";

message User {
    string id = 1;
    string email = 2;
    string username = 3;
}

message Contest {
    string title = 1;
    string slug = 2;
    bool active = 3;
}

message Subcontest {
    string title = 1;
    string slug = 2;
    bool is_owner = 3;
    bool is_member = 4;
}

message Country {
    string code = 1;
    string full_name = 2;
}

message RankedCountry {
    string code = 1;
    string full_name = 2;
    int64 points = 3;
    int64 wins = 4;
    int64 draws = 5;
    int64 losses = 6;
    int64 goals_for = 7;
    int64 goals_against = 8;
    int64 goal_difference = 9;
    int64 conduct_score = 10;
}

message Group {
    string letter = 1;
    repeated Country countries = 2 [(buf.validate.field).repeated = {
        min_items: 4,
        max_items: 4
    }];
}

message RankedGroup {
    string letter = 1;
    repeated RankedCountry ranked_countries = 2 [(buf.validate.field).repeated = {
        min_items: 4,
        max_items: 4
    }];
    optional bool extra_qualifier = 3;
}

message GroupPick {
    Group group = 1;
    bool extra_qualifier = 2;
}

message KnockoutEntry {
    Country country = 1;
    int64 round = 2;
}

message KnockoutPick {
    repeated KnockoutEntry entries = 1 [(buf.validate.field).repeated = {
        min_items: 32,
        max_items: 32
    }];
}

message Match {
    optional Country country1 = 1;
    optional Country country2 = 2;
    optional int64 country1_goals = 4;
    optional int64 country2_goals = 5;
    optional int64 country1_penalties = 6;
    optional int64 country2_penalties = 7;
}

message LeaderboardEntry {
    string name = 1;
    int64 score = 2;
}
